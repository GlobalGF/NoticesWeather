name: subsidies-weekly

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

jobs:
  scrape-and-upsert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/python/requirements.txt

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPER_SOURCES_FILE: scripts/python/subsidies_sources.json
          SCRAPER_OUTPUT_FILE: data/subsidies_latest.json
        run: |
          python scripts/python/subsidies_scraper.py

      - name: Upload latest JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: subsidies-latest
          path: data/subsidies_latest.json
